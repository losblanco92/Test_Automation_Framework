name: Test Automation Workflow

on:
  schedule:
    - cron: 00 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Running test automation framework with Maven
      run: mvn -X -Dbrowser=chrome -DisLambdaTest=false -DisHeadLess=true
      
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v3.2.2
      with:
       name: Test Logs
       path: logs/

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v3.2.2
      with:
       name: Test Reports
       path: report.html

    - name: Test Execution status
      run: echo "Test Execution Completed"


  

    
